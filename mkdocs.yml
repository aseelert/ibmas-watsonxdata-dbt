site_name: watsonx.data · dbt · Spark Medallion Demo
site_description: A beginner-friendly customer demo for dbt, Spark, Iceberg, and the medallion lakehouse on IBM watsonx.data.
repo_name: ibmas-watsonxdata-dbt
theme:
  name: material
  favicon: assets/images/logo.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.code.select
    - content.tooltips
    - search.highlight
    - search.suggest
extra_css:
  - assets/stylesheets/extra.css
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.details
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
nav:
  - Workshop:
    - Welcome: index.md
    - "1 · Prepare Your Machine": setup.md
  - Understand:
    - "Architecture & Data Flow": lineage.md
    - "When to Use Which (dbt · Spark · cpdctl)": choosing.md
    - Glossary: glossary.md
  - Build a Medallion (dbt or Spark):
    - "A · dbt — SQL Governance (full pipeline)": dbt-demo.md
    - "B · Spark — Python ETL (full pipeline)": spark-demo.md
  - Ingest & Compare:
    - "Ingest Raw Data — cpdctl (loader)": ingestion.md
    - "SQL — Compare dbt vs Spark Gold": sql-demo.md
  - Governance:
    - "Lineage UI (OpenMetadata)": openmetadata.md
    - "Semantic Models": semantic-models.md
  - Reference:
    - "Configuration & Files": configuration.md
    - "File Guide": files.md
    - Troubleshooting: troubleshooting.md
