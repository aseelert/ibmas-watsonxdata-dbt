# =============================================================================
#  docker-compose.yml — all-in-one entry point for the demo's OPTIONAL stacks
# -----------------------------------------------------------------------------
#  Location  : docker-compose.yml (repo root)
#  Repository: https://github.ibm.com/alexander/ibmas-watsonxdata-dbt
#  Project   : watsonx.data · dbt · Spark medallion demo
#  Author    : Alexander Seelert
#  Copyright : (c) 2026 Alexander Seelert — demo asset, provided as-is.
#
#  WHAT / WHY
#    This is the main entry point for the optional local services. Airflow is
#    defined directly here so the scheduler stack is managed by the same
#    `docker compose` command as the rest of the demo. Metabase and the vendored
#    OpenMetadata catalog stack are included below so you do not need separate
#    `-f <file>` invocations for day-to-day use.
#
#  USAGE (run from the repo root — no `-f` needed)
#    docker compose up -d                 # start ALL three stacks
#    docker compose up -d metabase        # or just one service/stack
#    docker compose ps                    # see everything in one project
#    docker compose down                  # stop all (keep volumes)
#    docker compose down -v --remove-orphans   # stop all + remove volumes
#    scripts/reset_demo.sh --docker       # full demo-scoped teardown (preferred)
#
#  NOTE
#    These stacks are OPTIONAL. The core dbt + Spark medallion demo runs fine
#    without any of them (see docs/dbt-demo.md and docs/spark-demo.md). Bringing
#    all three up at once is heavy — start only what you need on a small machine.
#
#  Ports: Metabase 3000 · Airflow 8082 · OpenMetadata 8585 (no host-port clashes).
# =============================================================================
name: ibmas-watsonxdata-dbt

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  env_file:
    - .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    AIRFLOW__CORE__AUTH_MANAGER: "airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager"
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: "admin:admin"
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: "/opt/airflow/logs/passwords.json"
    AIRFLOW__API__BASE_URL: "http://airflow-webserver:8080"
    AIRFLOW__API_AUTH__JWT_SECRET: "wxd-medallion-demo-shared-jwt-secret-change-me"
    AIRFLOW__API__SECRET_KEY: "wxd-medallion-demo-shared-flask-secret-change-me"
    DBT_PROFILES_DIR: /opt/airflow/project/profiles
    DBT_TARGET_PATH: /opt/airflow/logs/dbt-runtime/target
    DBT_LOG_PATH: /opt/airflow/logs/dbt-runtime/logs
    WXD_OBJECT_STORE_LOG_DIR: /opt/airflow/logs
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
    - airflow-plugins:/opt/airflow/plugins
    - .:/opt/airflow/project:ro
  extra_hosts:
    - "host.docker.internal:host-gateway"
  depends_on:
    airflow-postgres:
      condition: service_healthy

services:
  airflow-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/logs/dbt-runtime/target /opt/airflow/logs/dbt-runtime/logs
        echo '{"admin":"admin"}' > /opt/airflow/logs/passwords.json
        airflow db migrate
        echo "Init complete -> UI http://localhost:8082  (login: admin / admin)"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    restart: unless-stopped

volumes:
  airflow-postgres-data:
  airflow-logs:
  airflow-plugins:

include:
  - docker-compose-metabase.yml
  - openmetadata/docker-compose.yml
