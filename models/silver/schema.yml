version: 2

models:
  - name: silver_customers
    description: Clean, typed customer dimension.
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique
  - name: silver_products
    description: Clean, typed product dimension.
    columns:
      - name: product_id
        tests:
          - not_null
          - unique
  - name: silver_orders
    description: Clean, typed order headers.
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - relationships:
              arguments:
                to: ref('silver_customers')
                field: customer_id
      - name: status
        tests:
          - accepted_values:
              arguments:
                values: ['completed', 'returned', 'pending', 'cancelled']
  - name: silver_order_items
    description: Clean, typed order line items.
    columns:
      - name: order_item_id
        tests:
          - not_null
          - unique
      - name: order_id
        tests:
          - relationships:
              arguments:
                to: ref('silver_orders')
                field: order_id
      - name: product_id
        tests:
          - relationships:
              arguments:
                to: ref('silver_products')
                field: product_id
  - name: silver_sales_enriched
    description: Conformed, joined order-line fact (the augmented/enriched silver layer). One row per order item, enriched with order, product, and customer attributes. Single source for the gold marts.
    columns:
      - name: order_item_id
        tests:
          - not_null
          - unique
      - name: order_id
        tests:
          - relationships:
              arguments:
                to: ref('silver_orders')
                field: order_id
      - name: customer_id
        tests:
          - relationships:
              arguments:
                to: ref('silver_customers')
                field: customer_id
      - name: product_id
        tests:
          - relationships:
              arguments:
                to: ref('silver_products')
                field: product_id
  - name: time_spine_daily
    description: Daily time spine used by dbt Semantic Layer / MetricFlow validation and OpenMetadata-friendly dbt artifacts.
    time_spine:
      standard_granularity_column: date_day
    columns:
      - name: date_day
        description: One row per calendar day for 2026.
        granularity: day
        tests:
          - not_null
          - unique
