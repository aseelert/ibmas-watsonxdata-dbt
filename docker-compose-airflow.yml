---
# ===========================================================================
# Local Apache Airflow 3 for the watsonx.data medallion demo
# ===========================================================================
#
# OPTIONAL: this is the SCHEDULER layer. The core demo runs perfectly by hand
# (run dbt / the Spark jobs yourself); start this stack only when you want the
# same medallion builds to run on a timer with a UI to watch them.
#
# What this orchestrates (the SAME steps you run manually, now scheduled):
#
#   dbt_medallion_hourly    Presto/dbt medallion -> dbt_demo_{raw,bronze,silver,gold}
#   spark_medallion_hourly  watsonx.data Spark medallion -> spark_demo_{bronze,silver,gold}
#
# Design principles enforced here:
#   * SINGLE SOURCE OF TRUTH — every watsonx.data (WXD_*) value comes from .env
#     via `env_file`. None are duplicated below. The `environment:` block holds
#     ONLY Airflow/dbt infrastructure paths, never business config.
#   * NO COPIES — the repo (including certs/watsonxdata-ca.pem) is bind-mounted
#     read-only at /opt/airflow/project. The TLS cert is read straight from
#     there; it is never copied into the image or a volume.
#   * READ-ONLY PROJECT — dbt's writable outputs (target/, logs/) are redirected
#     into the logs volume so the mounted repo stays pristine.
#
# Runs on host port 8082 so it never clashes with OpenMetadata's Airflow (8080).
#
# First-time setup:
#   cp .env.example .env                              # fill in your values
#   cp profiles/profiles.example.yml profiles/profiles.yml
#   docker compose -f docker-compose-airflow.yml build
#   docker compose -f docker-compose-airflow.yml up airflow-init
#   docker compose -f docker-compose-airflow.yml up -d
#   open http://localhost:8082          # login: admin / admin
#
# Tear down (keep data):   docker compose -f docker-compose-airflow.yml down
# Tear down (wipe data):   docker compose -f docker-compose-airflow.yml down -v
# ===========================================================================

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  # All WXD_* business config (host, api key, instance id, schemas, cert path,
  # spark endpoints, object-store creds) is loaded verbatim from .env — once.
  env_file:
    - .env
  environment:
    # ---- Airflow core (infrastructure only) ----
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    # ⚠️  NOT FOR PRODUCTION — laptop demo creds. Before any shared deployment:
    #   real Fernet key, vault-sourced JWT/secret, a real auth manager (FAB/OAuth),
    #   managed Postgres, and move WXD_API_KEY into a secrets backend (it lands in
    #   the metadata DB via XCom/env today).
    # Airflow 3 native SimpleAuthManager (no Flask-AppBuilder needed).
    AIRFLOW__CORE__AUTH_MANAGER: "airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager"
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: "admin:admin"
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: "/opt/airflow/logs/passwords.json"
    # LocalExecutor task workers call back to the api-server's execution API.
    AIRFLOW__API__BASE_URL: "http://airflow-webserver:8080"
    # Shared secret so execution-API JWTs minted by the scheduler verify on the
    # api-server (otherwise: "Invalid auth token: Signature verification failed").
    AIRFLOW__API_AUTH__JWT_SECRET: "wxd-medallion-demo-shared-jwt-secret-change-me"
    AIRFLOW__API__SECRET_KEY: "wxd-medallion-demo-shared-flask-secret-change-me"
    # ---- dbt (infrastructure paths only — values still come from .env) ----
    # Project is mounted read-only, so point dbt's writable dirs at the logs volume.
    DBT_PROFILES_DIR: /opt/airflow/project/profiles
    DBT_TARGET_PATH: /opt/airflow/logs/dbt-runtime/target
    DBT_LOG_PATH: /opt/airflow/logs/dbt-runtime/logs
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
    - airflow-plugins:/opt/airflow/plugins
    # Whole repo, READ-ONLY: dbt project, seeds, models, scripts/, and certs/.
    # The Spark/Presto TLS cert is read from here — never copied.
    - .:/opt/airflow/project:ro
  # Lets in-container tasks reach a host-side port-forward (e.g. MinIO) if needed.
  extra_hosts:
    - "host.docker.internal:host-gateway"
  depends_on:
    airflow-postgres:
      condition: service_healthy

services:
  airflow-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # One-shot: migrate the metadata DB and seed the admin password + dbt dirs.
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/logs/dbt-runtime/target /opt/airflow/logs/dbt-runtime/logs
        # Fixed admin password so the api-server starts non-interactively.
        echo '{"admin":"admin"}' > /opt/airflow/logs/passwords.json
        airflow db migrate
        echo "Init complete -> UI http://localhost:8082  (login: admin / admin)"
    restart: "no"

  # Airflow 3: 'api-server' replaces the old 'webserver' (serves UI + REST API).
  airflow-webserver:
    <<: *airflow-common
    command: api-server
    ports:
      # host 8082 -> container 8080: the Airflow UI is at http://localhost:8082
      # (8082 chosen so it never collides with OpenMetadata's Airflow on 8080).
      - "8082:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Airflow 3: DAG parsing is its own process (no longer embedded in scheduler).
  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    restart: unless-stopped

volumes:
  airflow-postgres-data:
  airflow-logs:
  airflow-plugins:
