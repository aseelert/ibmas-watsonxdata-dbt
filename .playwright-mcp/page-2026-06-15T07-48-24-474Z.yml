              - link "Start the setup" [ref=e98] [cursor=pointer]:
                - /url: http://127.0.0.1:8123/setup/
              - link "See the architecture" [ref=e99] [cursor=pointer]:
                - /url: http://127.0.0.1:8123/lineage/
              - link "Run dbt path" [ref=e100] [cursor=pointer]:
                - /url: http://127.0.0.1:8123/dbt-demo/
              - link "Run Spark path" [ref=e101] [cursor=pointer]:
                - /url: http://127.0.0.1:8123/spark-demo/
              - link "Copy SQL demo" [ref=e102] [cursor=pointer]:
                - /url: http://127.0.0.1:8123/sql-demo/
          - paragraph [ref=e104]:
            - generic [ref=e105]: Built on
            - img "IBM" [ref=e106]
            - img "watsonx.data" [ref=e107]
            - img "dbt" [ref=e108]
            - img "Apache Spark" [ref=e109]
            - img "Apache Iceberg" [ref=e110]
          - heading "New Here? Read This First" [level=2] [ref=e111]
          - paragraph [ref=e112]: If you have never heard of dbt, Spark, or a "lakehouse", don't worry. Here is the whole thing in everyday language before any commands appear. Think of a small online shop that wants to understand its own sales.
          - generic [ref=e113]:
            - paragraph [ref=e114]: The story in one paragraph
            - paragraph [ref=e115]:
              - text: A shop exports its records as four spreadsheet files (customers, products, orders, items). On their own, those files can't answer questions like
              - emphasis [ref=e116]: "\"how much did we sell on Tuesday?\""
              - text: This demo takes those files and, step by step, turns them into clean, trustworthy tables you can ask questions of — and it does this
              - strong [ref=e117]: twice
              - text: ", using two different tools ("
              - strong [ref=e118]: dbt
              - text: and
              - strong [ref=e119]: Spark
              - text: ) so you can see how each one works.
          - heading "The words you'll keep seeing" [level=3] [ref=e120]
          - generic [ref=e121]:
            - generic [ref=e122]:
              - heading "Lakehouse" [level=3] [ref=e123]
              - paragraph [ref=e124]:
                - text: A "data lake" stores tons of raw files cheaply. A "warehouse" lets you query tidy data with SQL. A
                - strong [ref=e125]: lakehouse
                - text: "is both at once: cheap storage you can still query like a database."
            - generic [ref=e126]:
              - heading "watsonx.data" [level=3] [ref=e127]
              - paragraph [ref=e128]:
                - text: IBM's lakehouse product — the
                - strong [ref=e129]: building
                - text: where this all happens. It holds the storage, the engines that run queries, and the catalog (the index of which tables exist).
            - generic [ref=e130]:
              - heading "Medallion (bronze → silver → gold)" [level=3] [ref=e131]
              - paragraph [ref=e132]:
                - text: A way to organise data by quality, like refining metal.
                - strong [ref=e133]: Raw
                - text: ore →
                - strong [ref=e134]: bronze
                - text: (kept, labelled) →
                - strong [ref=e135]: silver
                - text: (cleaned) →
                - strong [ref=e136]: gold
                - text: (ready to use). Each step is more polished than the last.
            - generic [ref=e137]:
              - heading "CSV file" [level=3] [ref=e138]
              - paragraph [ref=e139]: A spreadsheet saved as plain text — just rows and commas. This is the raw starting data, the same kind of file Excel or Google Sheets can export.
            - generic [ref=e140]:
              - heading "Table vs. View" [level=3] [ref=e141]
              - paragraph [ref=e142]:
                - text: A
                - strong [ref=e143]: table
                - text: is data actually stored on disk. A
                - strong [ref=e144]: view
                - text: is a saved question — it stores no data, it just re-runs its query and shows fresh results every time you look.
            - generic [ref=e145]:
              - heading "dbt" [level=3] [ref=e146]
              - paragraph [ref=e147]:
                - text: A tool for
                - strong [ref=e148]: cleaning data with SQL
                - text: ", the safe way. You write each transformation as a file; dbt runs them in the right order, tests them, and documents them — like recipes plus version control for your data."
            - generic [ref=e149]:
              - heading "Spark" [level=3] [ref=e150]
              - paragraph [ref=e151]:
                - text: A powerful engine that splits big data work across
                - strong [ref=e152]: many computers at once
                - text: . Where dbt is one careful SQL cook, Spark is a whole kitchen brigade — built for large or heavy jobs.
            - generic [ref=e153]:
              - heading "Iceberg" [level=3] [ref=e154]
              - paragraph [ref=e155]:
                - text: The open
                - strong [ref=e156]: table format
                - text: "under the hood. It gives plain files database superpowers: safe updates, version history, and \"time travel\" to see how a table looked yesterday."
            - generic [ref=e157]:
              - heading "Presto" [level=3] [ref=e158]
              - paragraph [ref=e159]:
                - text: The
                - strong [ref=e160]: SQL engine
                - text: that actually runs the queries on the dbt path. dbt writes the SQL; Presto executes it against watsonx.data.
          - generic [ref=e161]:
            - paragraph [ref=e162]: Two tools, one goal — why both?
            - paragraph [ref=e163]:
              - strong [ref=e164]: dbt
              - text: and
              - strong [ref=e165]: Spark
              - text: are two different ways to do the same job here. dbt is the friendly choice when the work is
              - emphasis [ref=e166]: governed SQL analytics
              - text: (tests, documentation, lineage). Spark is the choice when the work is
              - emphasis [ref=e167]: big or heavy
              - text: (huge files, complex processing). This demo runs
              - strong [ref=e168]: both
              - text: on the same data so you can compare them honestly — neither overwrites the other.
          - heading "The Idea In One Minute" [level=2] [ref=e169]
          - paragraph [ref=e170]: "Imagine a shop exports four CSV files: customers, products, orders, and order lines. Those files are useful, but they are not yet a proper analytics system."
