            - generic [ref=e94]: IBM watsonx.data · medallion lakehouse demo
            - heading "Learn watsonx.data, dbt, Spark, and lakehouse layers in one demo" [level=1] [ref=e95]
            - paragraph [ref=e96]: "This guide is for a technical beginner: someone who can run commands, but has never seen watsonx.data, dbt, Spark, or a medallion lakehouse before. You will load small CSV files, build clean lakehouse tables, run tests, submit a Spark job, and compare the results."
