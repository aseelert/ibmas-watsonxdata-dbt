name: Deploy docs

# Build the MkDocs site and publish it to the gh-pages branch.
# Runs automatically when docs change on main, or on demand.
on:
  push:
    branches: [main]
    paths:
      - docs/**
      - mkdocs.yml
      - requirements.txt
      - .github/workflows/docs.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-docs
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install MkDocs
        run: |
          python -m pip install --upgrade pip
          python -m pip install "mkdocs>=1.6,<2.0" "mkdocs-material>=9.5,<10.0"

      - name: Build and deploy to gh-pages
        run: mkdocs gh-deploy --force --strict
